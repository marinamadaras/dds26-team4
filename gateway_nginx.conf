events { worker_connections 2048;}

http {
    # Extract shard keys from URL paths so all requests for the same entity
    # route to the same backend shard replica.
    map $uri $order_shard_key {
        ~^/orders/create/([^/]+)$ $1;
        ~^/orders/(?:find|addItem|checkout)/([^/]+).*$ $1;
        default $request_uri;
    }

    map $uri $stock_shard_key {
        ~^/stock/(?:find|add|subtract)/([^/]+).*$ $1;
        ~^/stock/item/create/[^/]+$ $remote_addr;
        default $request_uri;
    }

    map $uri $payment_shard_key {
        ~^/payment/(?:find_user|add_funds|pay)/([^/]+).*$ $1;
        ~^/payment/create_user$ $remote_addr;
        default $request_uri;
    }

    upstream order-app {
        hash $order_shard_key consistent;
        server order-service-0:5000;
        server order-service-1:5000;
        server order-service-2:5000;
    }
    upstream payment-app {
        hash $payment_shard_key consistent;
        server payment-service-0:5000;
        server payment-service-1:5000;
        server payment-service-2:5000;
    }
    upstream stock-app {
        hash $stock_shard_key consistent;
        server stock-service-0:5000;
        server stock-service-1:5000;
        server stock-service-2:5000;
    }
    server {
        listen 80;
        location /orders/ {
           proxy_set_header X-Shard-Key $order_shard_key;
           proxy_pass   http://order-app/;
        }
        location /payment/ {
           proxy_set_header X-Shard-Key $payment_shard_key;
           proxy_pass   http://payment-app/;
        }
        location /stock/ {
           proxy_set_header X-Shard-Key $stock_shard_key;
           proxy_pass   http://stock-app/;
        }
        access_log  /var/log/nginx/server.access.log;
    }
    access_log  /var/log/nginx/access.log;
}
