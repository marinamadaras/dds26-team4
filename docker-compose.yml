      kafka-init:
        condition: service_completed_successfully

  payment-service-2:
    image: user:latest
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_CONSUMER_PARTITION=2
      - KAFKA_CONSUMER_INSTANCE_ID=payment-service-2
      - REDIS_HOST=payment-db-2
    command: gunicorn -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=info app:app
    env_file:
