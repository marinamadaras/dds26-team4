services:
  gateway:
    image: nginx:1.25-bookworm
    restart: unless-stopped
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - api-gateway

  kafka:
    image: apache/kafka:latest
    hostname: kafka
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  kafka-init:
    image: apache/kafka:latest
    depends_on:
      kafka:
        condition: service_started
    volumes:
      - ./kafka/init-topics.sh:/init-topics.sh
      - ./kafka/topics.txt:/topics.txt
    entrypoint: [ "/bin/bash", "/init-topics.sh" ]

  api-gateway:
    build: ./api-gateway
    image: api-gateway:latest
    restart: unless-stopped
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_PARTITIONS=3
      - KAFKA_REQUEST_TIMEOUT_SECONDS=10
    depends_on:
      kafka:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully

  orchestrator-0:
    build: ./orchestrator
    image: orchestrator:latest
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
#      - KAFKA_TASKS_TOPIC=orchestrator.tasks
      - ORDER_SERVICE_URL=http://order-service-0:5000
      - PAYMENT_SERVICE_URL=http://payment-service-0:5000
      - STOCK_SERVICE_URL=http://stock-service-0:5000
      - ORCHESTRATOR_REQUEST_TIMEOUT_SECONDS=5
      - KAFKA_CONSUMER_PARTITION=0
      - REDIS_HOST=orchestrator-db-0
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis
      - REDIS_DB=0
    depends_on:
      - orchestrator-db-0
      - order-service-0
      - payment-service-0
      - stock-service-0

  orchestrator-1:
    image: orchestrator:latest
    restart: unless-stopped
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - ORDER_SERVICE_URL=http://order-service-0:5000
      - PAYMENT_SERVICE_URL=http://payment-service-0:5000
      - STOCK_SERVICE_URL=http://stock-service-0:5000
      - ORCHESTRATOR_REQUEST_TIMEOUT_SECONDS=5
      - KAFKA_CONSUMER_PARTITION=1
      - REDIS_HOST=orchestrator-db-1
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis
      - REDIS_DB=0
    depends_on:
      - orchestrator-db-1
      - order-service-1
      - payment-service-1
      - stock-service-1

  orchestrator-2:
    image: orchestrator:latest
    restart: unless-stopped
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - ORDER_SERVICE_URL=http://order-service-0:5000
      - PAYMENT_SERVICE_URL=http://payment-service-0:5000
      - STOCK_SERVICE_URL=http://stock-service-0:5000
      - ORCHESTRATOR_REQUEST_TIMEOUT_SECONDS=5
      - KAFKA_CONSUMER_PARTITION=2
      - REDIS_HOST=orchestrator-db-2
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis
      - REDIS_DB=0
    depends_on:
      - orchestrator-db-2
      - order-service-2
      - payment-service-2
      - stock-service-2

  orchestrator-db-0:
    image: redis:7.2-bookworm
    restart: unless-stopped
    command: redis-server --requirepass redis --maxmemory 256mb

  orchestrator-db-1:
    image: redis:7.2-bookworm
    restart: unless-stopped
    command: redis-server --requirepass redis --maxmemory 256mb

  orchestrator-db-2:
    image: redis:7.2-bookworm
    restart: unless-stopped
    command: redis-server --requirepass redis --maxmemory 256mb

  order-service-0:
    build: ./order
    image: order:latest
    restart: unless-stopped
    environment:
      - GATEWAY_URL=http://gateway:80
      - ORCHESTRATOR_URL=http://orchestrator-0:5000
      - ORCHESTRATOR_PARTITIONS=3
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_CONSUMER_PARTITION=0
      - KAFKA_CONSUMER_INSTANCE_ID=order-service-0
      - REDIS_HOST=order-db-0
    command: gunicorn -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=info ${ORDER_APP_MODULE:-app}:app
    env_file:
      - env/order_redis.env
    depends_on:
      order-db-0:
        condition: service_started
      kafka:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully

  order-service-1:
    image: order:latest
    restart: unless-stopped
