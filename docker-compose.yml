    depends_on:
      order-db-2:
        condition: service_started
      kafka:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully

  order-db-0:
    image: redis:7.2-bookworm
    restart: unless-stopped
    command: redis-server --requirepass redis --maxmemory 512mb

  order-db-1:
    image: redis:7.2-bookworm
    restart: unless-stopped
