      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_CONSUMER_PARTITION=2
      - KAFKA_CONSUMER_INSTANCE_ID=order-service-2
      - REDIS_HOST=order-db-2
    command: gunicorn -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=info ${ORDER_APP_MODULE:-app}:app
    env_file:
