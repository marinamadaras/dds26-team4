    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_CONSUMER_PARTITION=1
      - KAFKA_CONSUMER_INSTANCE_ID=stock-service-1
      - REDIS_HOST=stock-db-1
    command: gunicorn -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=info app:app
    env_file:
      - env/stock_redis.env
    depends_on:
      stock-db-1:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  stock-service-2:
    image: stock:latest
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_CONSUMER_PARTITION=2
      - KAFKA_CONSUMER_INSTANCE_ID=stock-service-2
      - REDIS_HOST=stock-db-2
    command: gunicorn -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=info app:app
    env_file:
      - env/stock_redis.env
    depends_on:
      stock-db-2:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  stock-db-0:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  stock-db-1:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  stock-db-2:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  payment-service-0:
    build: ./payment
    image: user:latest
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_CONSUMER_PARTITION=0
      - KAFKA_CONSUMER_INSTANCE_ID=payment-service-0
      - REDIS_HOST=payment-db-0
    command: gunicorn -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=info app:app
    env_file:
