      - WATCHDOG_INTERVAL_SECONDS=5
      - WATCHDOG_SERVICES=orchestrator-0 orchestrator-1 orchestrator-2 orchestrator-db-0 orchestrator-db-1 orchestrator-db-2 order-service-0 order-service-1 order-service-2 stock-service-0 stock-service-1 stock-service-2 payment-service-0 payment-service-1 payment-service-2 order-db-0 order-db-1 order-db-2 stock-db-0 stock-db-1 stock-db-2 payment-db-0 payment-db-1 payment-db-2
