    depends_on:
      payment-db-2:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  payment-db-0:
    image: redis:7.2-bookworm
    command: redis-server --requirepass redis --maxmemory 512mb

  payment-db-1:
    image: redis:7.2-bookworm
