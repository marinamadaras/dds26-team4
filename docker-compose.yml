      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_CONSUMER_PARTITION=1
      - KAFKA_CONSUMER_INSTANCE_ID=order-service-1
      - REDIS_HOST=order-db-1
    command: gunicorn -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=info ${ORDER_APP_MODULE:-app}:app
    env_file:
      - env/order_redis.env
    depends_on:
      order-db-1:
        condition: service_started
      kafka:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully

  order-service-2:
