# Generated by scripts/generate_compose_variants.py
# 24-partition cluster sized to exactly 90 CPUs, leaving 6 CPUs for Locust on a 96-core host.
services:
  gateway:
    image: nginx:1.25-bookworm
    restart: unless-stopped
    cpus: "1.20"
    volumes:
      - ./gateway_nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - api-gateway

  kafka:
    image: apache/kafka:latest
    hostname: kafka
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  kafka-init:
    image: apache/kafka:latest
    depends_on:
      kafka:
        condition: service_started
    environment:
      KAFKA_PARTITIONS: 24
    volumes:
      - ./kafka/init-topics.sh:/init-topics.sh
      - ./kafka/topics.txt:/topics.txt
    entrypoint: ["/bin/bash", "/init-topics.sh"]

  api-gateway:
    build: ./api-gateway
    image: api-gateway:latest
    restart: unless-stopped
    cpus: "2.00"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_PARTITIONS: 24
      KAFKA_REQUEST_TIMEOUT_SECONDS: 10
    depends_on:
      kafka:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully

  order-service-0:
    build: ./order
    image: order:latest
    restart: unless-stopped
    cpus: "0.90"
    environment:
      GATEWAY_URL: http://gateway:80
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CONSUMER_PARTITION: 0
      KAFKA_CONSUMER_INSTANCE_ID: order-service-0
      REDIS_HOST: order-db-0
    command: gunicorn -b 0.0.0.0:5000 -w 1 --timeout 30 --log-level=info ${ORDER_APP_MODULE:-order2pcApp}:app
    env_file:
      - env/order_redis.env
    depends_on:
      order-db-0:
        condition: service_started
      kafka:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully

  order-db-0:
    image: redis:7.2-bookworm
    restart: unless-stopped
    cpus: "0.25"
    command: redis-server --requirepass redis --maxmemory 512mb

  order-service-1:
    image: order:latest
    restart: unless-stopped
    cpus: "0.90"
    environment:
      GATEWAY_URL: http://gateway:80
